# Start For General Approval by hjkim
# 1. \uACB0\uC7AC\uAC00 \uD544\uC694\uD55C Policy\uB97C Symbolic Name\uC73C\uB85C \uCD94\uAC00 \uD55C\uB2E4.(\uAD6C\uBD84\uC790:,)
#   - emxFramework.ApprovalLine.GeneralApprovalType=policy_ECO,policy_ECR
#
# 2. \uD574\uB2F9 Policy\uC5D0\uC11C \uACB0\uC7AC\uAC00 \uD544\uC694\uD55C State\uB97C Symbolic Name\uC73C\uB85C \uAE30\uC220 \uD55C\uB2E4
#   - \uAC19\uC740 State\uC5D0 \uC5EC\uB824 \uC720\uD615\uC774 \uD544\uC694\uD558\uBA74 State\uB97C \uBC18\uBCF5 \uAD6C\uC131\uD55C\uB2E4
#   - emxFramework.ApprovalLine.policy_ECO.States = state_Create,state_DesignWork,state_DesignWork,state_Review,state_Release
#   2-1 OID\uC758 \uC0C1\uD0DC\uC5D0 \uB530\uB77C \uACB0\uC7AC \uD544\uC694 State\uAC00 \uB2E4\uC591\uD560 \uACBD\uC6B0[Optional]
#               --> JPONAME|FUNCIONNAME \uC5D0\uC11C FUNCIONNAME\uC740
#                       - Parameter : String[] --> unpack \uC2DC FormBean key \uAD6C\uC131\uC740 ("objectId", "policyName")
#                       - Return : ArrayList<String>
#                                   emxFramework.ApprovalLine.<SYMBOLIC_POLICY>.States
#                                   emxFramework.ApprovalLine.<SYMBOLIC_POLICY>.RouteAction
#                                   emxFramework.ApprovalLine.<SYMBOLIC_POLICY>.Parallel \uC5D0 \uD574\uB2F9\uD558\uB294 \uC815\uBCF4\uAC00  Return \uB418\uB3C4\uB85D \uC218\uC815 \uD55C\uB2E4.
#           emxFramework.ApprovalLine.policy_ECR.DynamicStates = dskGeneralApprovalUtil|getECRStateForApprovalLine
#
#   2-2 \uACB0\uC7AC \uD544\uC218 \uC0C1\uD0DC\uB97C \uC9C0\uC815\uD558\uC5EC \uACB0\uC7AC \uD544\uC218 \uC0C1\uD0DC\uC5D0 \uACB0\uC7AC\uC790\uAC00 \uC9C0\uC815\uB418\uC9C0 \uC54A\uC740\uACBD\uC6B0 \uC9C4\uD589\uD558\uC9C0 \uBABB\uD558\uB3C4\uB85D \uD55C\uB2E4.
#   - \uB2E8 dynamicState,AutoRoute\uAC00 \uC124\uC815\uB418 \uC788\uC73C\uBA74 \uBC30\uC7AC\uD568. dskPolicyAllPromoteCheck Trigger \uC0AC\uC6A9.
#   - emxFramework.ApprovalLine.policy_ECO.States.Requrired = State_Review
#
# 3. \uAC01 State\uC758 \uACB0\uC7AC \uC720\uD615\uC744 \uC9C0\uC815 \uD55C\uB2E4.(Approve,Comment,Notify Only-->\uB300\uC18C\uBB38\uC790 \uAD6C\uBD84\uD568)
#   - emxFramework.ApprovalLine.policy_ECO.RouteAction = Comment,Comment,Approve,Approve,Notify Only
#
# 4. \uAC01 State\uC758 \uACB0\uC7AC \uC21C\uC11C \uD544\uC694 \uC720\uBB34.(true,false-->\uB300\uC18C\uBB38\uC790 \uAD6C\uBD84 \uC548\uD568)
#   - Comment,Notify Only\uC758 \uACBD\uC6B0 \uBB34\uC870\uAC74 true
#   - emxFramework.ApprovalLine.policy_ECO.Parallel = true,true,true,false,true
#
# 5. Title \uC9C0\uC815(Option)
#   5.1 \uC81C\uBAA9\uC758 Format \uC9C0\uC815, \uBBF8\uC9C0\uC815\uC2DC emxFramework.ApprovalLine.Title.Value.Default \uC0AC\uC6A9
#   - Default\uC758 \uACBD\uC6B0 emxFrameworkStringResource.properties\uC5D0 emxFramework.ApprovalLine.Title \uC5D0 {1} \uBD80\uD130 Mapping \uB428
#   5.2 \uAC01 State\uBCC4\uB85C \uC81C\uBAA9 Format\uC744 \uC9C0\uC815 \uD574\uC57C \uB41C\uB2E4. Default\uB97C \uC0AC\uC6A9 \uD558\uACE0\uC790 \uD558\uB294 State\uB294 default\uB97C \uC9C0\uC815 \uD55C\uB2E4.
#   - Format\uC740 \uC22B\uC790\uB97C \uC9C0\uC815(1~9) \uD574\uB2F9 \uC22B\uC790\uC640 \uC870\uD569\uB41C Key\uAC00 emxFrameworkStringResource(_ko)\uC5D0 \uC874\uC7AC \uD574\uC57C \uB428(\uC5C6\uC73C\uBA74 Default \uC0AC\uC6A9)
#       \uC608) emxFramework.ApprovalLine.policy_ECO.Title.Format = default,1,2,default \uC9C0\uC815\uC2DC
#           - StringResource\uC5D0 emxFramework.ApprovalLine.policy_ECO.Title.1, emxFramework.ApprovalLine.policy_ECO.Title.2\uAC00 \uC874\uC7AC \uD574\uC57C \uB41C\uB2E4.
#   - Format\uC740 \uC5D0 \uD504\uB85C\uADF8\uB7A8\uC744 \uC9C0\uC815 \uD560 \uC218 \uC788\uB294\uB370 \uC774\uB54C\uB294 JPONAME|FUNCTIONNAME \uC73C\uB85C \uC9C0\uC815 \uD55C\uB2E4. \uC774\uACBD\uC6B0 StringResource\uB97C \uC77D\uC9C0 \uC54A\uC73C\uBA70, \uD574\uB2F9 \uD504\uB85C\uADF8\uB7A8\uC5D0\uC11C title\uC744 Return \uD574\uC57C \uB41C\uB2E4.
#   5.3 Format\uC744 State\uBCC4\uB85C \uC9C0\uC815 \uD55C \uACBD\uC6B0 \uD574\uB2F9 Format\uACFC \uCE58\uD658\uB420 Value\uB3C4 \uC9C0\uC815 \uD55C\uB2E4.
#   - Value\uB3C4 \uAC01 State\uBCC4\uB85C \uC9C0\uC815 \uD574\uC57C \uB418\uBA70, Default \uC0AC\uC6A9\uC744 \uC6D0\uD558\uB294 \uACBD\uC6B0 default\uB97C \uC9C0\uC815 \uD55C\uB2E4.
#   - \uAC01 \uAC12\uC740 Object\uC758 Selectable \uC774\uBA70, \uD55C State\uC5D0 \uC5EC\uB7EC Value\uB97C \uC9C0\uC815 \uD560 \uACBD\uC6B0 |\uB97C \uAD6C\uBD84\uC790\uB85C \uD55C\uB2E4.
#      \uC608) emxFramework.ApprovalLine.policy_ECO.Title.Format.Value = default,$<attribute[attribute_Title].value>,$<attribute[attribute_Title].value>,default
#
# 6. Route Auto Start \uC9C0\uC815
#   6.1 Route\uAC00 \uD574\uB2F9 State\uC5D0 \uB3C4\uB2EC \uD588\uC744 \uACBD\uC6B0, \uC790\uB3D9 Start\uC5EC\uBD80 Default : true
#   - emxFramework.ApprovalLine.policy_ECO.AutoStart = false,true,true,true,true
#   - 'eService Trigger Program Parameters' 'dskPolicyAllPromoteAction' 'CreateRouteForAttribute' \uB97C \uD574\uB2F9 Policy state\uC5D0 \uCD94\uAC00
#   - AutoStart\uB9CC\uC744 \uC704\uD574\uC11C \uC0AC\uC6A9\uD55C\uB2E4\uBA74 triggerAutoResumeRoute \uD568\uC218\uB97C \uC774\uC6A9\uD574\uB3C4 \uB428
#       "PolicyAllStateAllPromoteAction" "Route Auto Resume Process"
#   6.2 Object\uAC00 \uD2B9\uC815 State\uC5D0 \uB3C4\uB2EC \uD588\uC744 \uACBD\uC6B0 \uC790\uB3D9\uC73C\uB85C Route\uB97C \uC0DD\uC131
#   -  Trigger Env\uC5D0 OBJECTID, NEXTSTATE , POLICY \uB4F1\uC73C\uB85C \uC774\uC6A9\uD558\uACE0 Property\uB97C \uC774\uC6A9\uD558\uC5EC \uC0DD\uC131\uD55C\uB2E4.
#   -  emxFramework.AutoRoute.policy_ECO.state_DesignWork.RouteAction=Comment (Approve)
#   -  emxFramework.AutoRoute.policy_ECO.state_DesignWork.ApproverType=Person (Group,Role)
#   -  emxFramework.AutoRoute.policy_ECO.state_DesignWork.Approver=$<to[relationship_AssignedEC].from.name> : \uBC18\uB4EF\uC774 Person \uC758 Name\uC774 \uB4E4\uC5B4\uC640\uC57C\uD568
#   -  emxFramework.AutoRoute.policy_ECO.state_DesignWork.CompleteAction=Promote Connected Object
#
# 7. \uD2B9\uC815 Status\uC5D0 \uACB0\uC7AC\uC790 \uC790\uB3D9 \uC9C0\uC815\uC774 \uD544\uC694\uD55C \uACBD\uC6B0 \uD574\uB2F9 Program \uB610\uB294 Object Selectable\uC744 \uC9C0\uC815 \uD55C\uB2E4.
#   - State \uC21C\uC11C\uAC00 \uBC18\uB4DC\uC2DC \uC77C\uCE58 \uD574\uC57C \uB41C\uB2E4. \uD544\uC694 \uC5C6\uB294 \uACBD\uC6B0\uB294 false(\uB300\uC18C\uBB38\uC790 \uAD6C\uBD84 \uC5C6\uC74C)\uC744 \uC9C0\uC815 \uD55C\uB2E4.
#   - Object\uC758 Selectable (Program\uC778 \uACBD\uC6B0 program[JPONAME - method FUNCIONNAME ]\uC744 \uC785\uB825 \uD55C\uB2E4.
#   - emxFramework.ApprovalLine.policy_ECO.AutoApprover = none,program[dskGeneralApprovalUtil -method setAutoApprover ${OBJECTID}],$<attribute[attribute_ResponsibleDesignEngineer].value>,NONE
#
# 8. \uAC01 Policy\uBCC4 Instruction\uB97C \uC9C0\uC815 \uD55C\uB2E4.
#   - fstFramework.Instruction.<SYMBOLIC_POLICY> = Instruction \uB0B4\uC6A9
#   - fstFramework.Instruction.policy_fstDocument = \uACB0\uC7AC\uB97C \uC694\uCCAD\uD569\uB2C8\uB2E4.
#
# 9. \uB0B4 \uACB0\uC7AC\uD568\uC5D0\uC11C \uD544\uD130\uB97C \uCD94\uAC00\uD560 Type\uB97C Symbolic Name\uC73C\uB85C \uCD94\uAC00 \uD55C\uB2E4.(\uAD6C\uBD84\uC790 : ,)
#     \uB0B4 \uACB0\uC7AC\uD568\uC5D0\uC11C \uD544\uD130\uB97C \uCD94\uAC00\uD55C Type\uC758 Selection\uC744 \uC9C0\uC815\uD55C\uB2E4.(Default : multiple) 
#   - emxFramework.Filter.MyTask = <SYMBOLIC_TYPE>,<SYMBOLIC_TYPE>...
#   - emxFramework.Filter.MyTask.<SYMBOLIC_TYPE>.Selectiojn = none/single/multiple
#
# 10. \uAC01 Policy\uBCC4 \uBCF8\uC778 \uACB0\uC7AC Comment\uB97C \uC9C0\uC815 \uD55C\uB2E4.
#   - fstFramework.SelfApprover.Comment.<SYMBOLIC_POLICY> = Comment \uB0B4\uC6A9
#   - fstFramework.SelfApprover.Comment.policy_fstDocument = [fstDocument] \uBCF8\uC778 \uACB0\uC7AC\uB85C \uACB0\uC7AC\uD558\uC600\uC2B5\uB2C8\uB2E4.
#
# 11. \uBCF8\uC778\uACB0\uC7AC\uAC00 \uD544\uC694\uD55C Policy\uB97C Symbolic Name\uC73C\uB85C \uCD94\uAC00 \uD55C\uB2E4.(\uAD6C\uBD84\uC790:,)
#   - emxFramework.Use.SelfApprovalPolicyList = <SYMBOLIC_POLICY>,<SYMBOLIC_POLICY>...
#   - emxFramework.Use.SelfApprovalPolicyList = policy_fstPORApprHeader,policy_fstDocument
#
# 12. \uBC18\uB824, \uD68C\uC218\uD560 \uB54C Demote\uD560 \uC0C1\uD0DC\uB97C \uC9C0\uC815 \uD55C\uB2E4.
#   - \uBC18\uB824(\uACB0\uC7AC\uC7AC\uC0C1\uC2E0\uC744 \uD558\uAE30 \uC704\uD574\uC11C\uB294 \uD574\uB2F9 \uD56D\uBAA9\uC758 \uCC98\uC74C State\uB97C \uB4F1\uB85D)
#	  - emxFramework.Reject.<SYMBOLIC_POLICY>.<SYMBOLIC_STATE>=<SYMBOLIC_STATE>
#    \uC608) emxFramework.Reject.policy_fstDocument.state_Approving=state_Working
#   - \uD68C\uC218(\uD574\uB2F9 \uD56D\uBAA9\uC758 \uCC98\uC74C State\uB97C \uB4F1\uB85D)
#   - emxFramework.Withdraw.<SYMBOLIC_POLICY>=<SYMBOLIC_STATE>
#    \uC608)emxFramework.Withdraw.policy_fstDocument=state_Working
